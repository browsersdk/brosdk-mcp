version: 2

project_name: brosdk-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: brosdk-mcp
    main: ./cmd/brosdk-mcp
    binary: brosdk-mcp
    ldflags:
      - -X main.Version={{.Version}} -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - PROTOCOL.md
      - AGENT_INTEGRATION.md
      - schemas/browser-tools.schema.json
      - examples/**

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
